name: CouponBandit

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: couponbandit-app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - couponbandit_vendor:/var/www/html/vendor
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost:8000}
      DB_CONNECTION: ${DB_CONNECTION_DOCKER:-pgsql}
      DB_HOST: ${DB_HOST_DOCKER:-db}
      DB_PORT: ${DB_PORT_DOCKER:-5432}
      DB_DATABASE: ${DB_DATABASE_DOCKER:-couponbandit}
      DB_USERNAME: ${DB_USERNAME_DOCKER:-app}
      DB_PASSWORD: ${DB_PASSWORD_DOCKER:-REDACTED}
    expose:
      - "9000"
    depends_on:
      db:
        condition: service_healthy

  web:
    image: nginx:1.27-alpine
    container_name: couponbandit-web
    ports:
      - "8000:80"
    volumes:
      - ./public:/var/www/html/public:ro
      - ./storage/app/public:/var/www/html/storage/app/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  node:
    image: node:22-alpine
    container_name: couponbandit-node
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    command: sh -lc "npm ci && npm run build"
    profiles: ["assets"]

  vite:
    image: node:22-alpine
    container_name: couponbandit-vite
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    ports:
      - "5173:5173"
    command: sh -lc "npm ci && npm run dev:docker"
    profiles: ["dev"]

  db:
    image: postgres:16
    container_name: couponbandit-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USERNAME_DOCKER:-app}
      POSTGRES_PASSWORD: ${DB_PASSWORD_DOCKER:-REDACTED}
      POSTGRES_DB: ${DB_DATABASE_DOCKER:-couponbandit}
    volumes:
      - couponbandit_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME_DOCKER:-app} -d ${DB_DATABASE_DOCKER:-couponbandit}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  couponbandit_pgdata:
  couponbandit_vendor:
